<div class="register-wrapper">
  <div class="glass-card">
    <div class="card-header">
      <h2>Registrar Propietario</h2>
      <p>Vincula tu cuenta a un negocio existente</p>
    </div>

    @if (errorMessage) {
      <div class="alert alert-error">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="alert alert-success">
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          placeholder="Elige un usuario" 
          required 
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="••••••••" 
          required 
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="empresaId">ID de la Empresa (UUID)</label>
        <input 
          type="text" 
          id="empresaId" 
          name="empresaId" 
          [(ngModel)]="empresaId" 
          placeholder="Ej: a5e7c10b-d24f..." 
          required
        />
        <small class="help-text">Ingresa el ID del negocio asignado en tu base de datos.</small>
      </div>

      <button type="submit" [disabled]="isLoading" class="btn-submit">
        @if (isLoading) {
          <span>Registrando...</span>
        } @else {
          <span>Registrar</span>
        }
      </button>
    </form>

    <div class="card-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
