# ============================================
# 1. CONFIGURACION DEL SERVIDOR
# ============================================
server.port=8080

# ============================================
# 2. CONFIGURACION DE POSTGRESQL (MULTI-TENANT)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/agendamiento_db
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# 3. CONFIGURACION DE JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Ejecutar migración de columna username -> email (solo si es necesario)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ============================================
# 4. CREDENCIALES WHATSAPP CLOUD API (HANDSHAKE)
# ============================================
whatsapp.verification.token=MiTokenSecretoDelHackathon2026
whatsapp.api.token=${WHATSAPP_API_TOKEN:}
stripe.api.key=CAMBIAR_POR_LLAVE_REAL
stripe.webhook.secret=CAMBIAR_POR_FIRMA_REAL

# ============================================
# 5. CONFIGURACION DE SMTP (CORREO ELECTRONICO)
# ============================================
# Configura aquí tus credenciales de Gmail u otro proveedor SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-correo-temporal@gmail.com
spring.mail.password=tu-contrasena-de-aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true